Container@MAINMENU:
	Logic: MainMenuLogicCA
	Children:
		LogicKeyListener@GLOBAL_KEYHANDLER:
			Logic: MusicHotkeyLogic, ScreenshotHotkeyLogic, MuteHotkeyLogic
				StopMusicKey: StopMusic
				PauseMusicKey: PauseMusic
				PrevMusicKey: PrevMusic
				NextMusicKey: NextMusic
				TakeScreenshotKey: TakeScreenshot
				MuteAudioKey: ToggleMute
		Background@BORDER:
			Background: mainmenu-border
			X: -15
			Y: -15
			Width: WINDOW_WIDTH + 30
			Height: WINDOW_HEIGHT + 30
		ImageCA@LOGO:
			X: (WINDOW_WIDTH - 512) / 2
			Y: 30
			ImageCollection: menu-logo
			ImageName: logo
			MinXResolution: 1680
		ImageCA@LOWRESLOGO:
			X: (WINDOW_WIDTH - 512)
			Y: 30
			ImageCollection: menu-logo
			ImageName: logo
			MaxXResolution: 1679
		Label@VERSION_LABEL:
			Logic: VersionLabelLogic
			X: (WINDOW_WIDTH) - 512 - 35
			Y: 25
			Width: 512
			Height: 25
			Align: Right
			Font: Regular
			Shadow: true
		Container@MENUS:
			X: 13 + (WINDOW_WIDTH - 522) / 4 - WIDTH / 2
			Y: WINDOW_HEIGHT / 2 - HEIGHT / 2
			Width: 200
			Height: 360
