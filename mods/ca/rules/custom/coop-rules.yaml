	ScriptLobbyDropdown@basesharing:
		ID: basesharing
		Label: Base Sharing
			Description: 启用基地共享后，如果你没有对应建筑，就可以使用队友的生产建筑进行生产（优先使用最近建造的建筑）。\n\n- 在无基地任务中无效。\n- 升级不会共享。\n- 电力不会共享。\n- 启用后，初始机动建造车或建造场将归第一位玩家所有。
		Values:
			0: Off
			1: On
		Default: 1
		DisplayOrder: 999

	ScriptLobbyDropdown@incomeshare:
		ID: incomeshare
		Label: Income Sharing
			Description: 将所有玩家精炼厂收入按比例共享给其他所有玩家。\n\n由于技术原因，这会使储存建筑失去作用。\n\n选择带额外收入的选项可能会显著降低任务难度。
		Values:
			0: Off
			100: Equally Split
			125: Equal +25% Per Ally
			150: Equal +50% Per Ally
			175: Equal +75% Per Ally
			999: Full Amount to All
			10: 10% Shared
			15: 15% Shared
			20: 20% Shared
			25: 25% Shared
			30: 30% Shared
			35: 35% Shared
			40: 40% Shared
			45: 45% Shared
			50: 50% Shared
		Default: 100
		DisplayOrder: 999

	ScriptLobbyDropdown@enattackstr:
		ID: enattackstr
		Label: Enemy Attack Modifier
			Description: 提高电脑进攻波次的频率和规模（在难度修正后生效）。
		Values:
			0: +0%
			20: +20%
			40: +40%
			60: +60%
			80: +80%
			100: +100%
			120: +120%
			140: +140%
			160: +160%
			180: +180%
			200: +200%
			250: +250%
			300: +300%
		Default: 0
		DisplayOrder: 999

	ScriptLobbyDropdown@enemyranks:
		ID: enemyranks
		Label: Enemy Veterancy
			Description: 为所有敌方战斗单位赋予该等级的基础老兵级别，以提升其属性。
		Values:
			0: 0
			1: 1
			2: 2
			3: 3
		Default: 0
		DisplayOrder: 999

	ScriptLobbyDropdown@oremines:
		ID: oremines
		Label: Resource Spawners
			Description: 调整地图上的资源生成点。\n\n- 无变化：资源生成点保持不变\n- 额外添加：为每片没有生成点的矿区添加矿井或泰矿树，数量因地图而异。\n- 升级：所有矿石矿井变为宝石矿井，所有绿色泰矿树变为蓝色泰矿树。\n- 添加并升级：添加生成点并将其全部升级\n- 全部删除：移除所有生成点。警告：资源将变为总量有限，这可能让部分任务\n     在非近乎完美操作下变得极其困难甚至无法完成。
		Values:
			oreoff: No Change
			oreon: Additional
			oreupgrade: Upgrade
			oreonupgrade: Add & Upgrade
			orefinite: Delete All (Hardcore)
		Default: oreoff
		DisplayOrder: 999

	ScriptLobbyDropdown@enmp:
		ID: enmp
		Label: Duplicate Enemy Starting Units
			Description: 按倍率增加敌方初始地面战斗单位。\n\n该数值过高时，部分任务可能无法通关。
		Values:
			999: x Player Count
			0: 1x (Off)
			1: 2x
			2: 3x
			3: 4x
			4: 5x
			5: 6x (Shouldn't go higher)
			6: 7x
			7: 8x
			8: 9x
			9: 10x
			10: 11x
			11: 12x (Stop it!)
			19: 20x (CPU may melt)
			49: 50x (Abandon all hope!!!)
		Default: 0
		DisplayOrder: 1000

	ScriptLobbyDropdown@prmp:
		ID: prmp
		Label: Duplicate Enemy Produced Units
			Description: 复制敌方电脑生产的所有地面战斗单位。\n\n这会显著提高难度，请谨慎使用。
		Values:
			999: x Player Count
			0: 1x (Off)
			1: 2x
			2: 3x
			3: 4x
			4: 5x
			5: 6x (Shouldn't go higher)
			6: 7x
