			9: 10x
			10: 11x
			11: 12x (Stop it!)
			19: 20x (CPU may melt)
			39: 50x (Abandon all hope!!!)
		Default: 0
		DisplayOrder: 1000

	ScriptLobbyDropdown@pfollow:
		ID: pfollow
		Label: Produced Duplicates Follow
			Description: 复制出的生产单位跟随其“原单位”行动，并在原单位死亡后进入狩猎模式的概率。\n\n会形成更大的进攻波次。\n\n跟随单位在一段时间后也会自动切换为狩猎模式，以避免堵塞生产区域。
