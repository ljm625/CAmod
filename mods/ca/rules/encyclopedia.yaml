# For encyclopedia entries not tied to specific units etc.

encyclopedia.tips.general:
	Interactable:
	AlwaysVisible:
	Tooltip:
		Name: 通用
	Encyclopedia:
		Category: 其他/提示
	EncyclopediaExtras:
		HideNotProducible: true
		Description: encyclopedia-tips-general-description

^EffectPreview:
	Inherits: ^PreviewDummy
	Encyclopedia:
		Scale: 2
	EncyclopediaExtras:
		HideNotProducible: true

^VehicleEffectPreview:
	Inherits: ^EffectPreview
	RenderSprites:
		Image: 4tnk
	WithFacingSpriteBody:
	WithSpriteTurret:
		Sequence: turret
	Turreted:

^InfantryEffectPreview:
	Inherits: ^EffectPreview
	RenderSprites:
		Image: e1
		PlayerPalette: playertd
	WithInfantryBody:
		IdleSequences: idle1,idle2
		StandSequences: stand,stand2
	QuantizeFacingsFromSequence:
		Sequence: stand

^SupportPowerPreview:
	Inherits: ^InvisibleDummy
	Buildable:
		BuildDurationModifier: 100
	RenderSprites:
		Image: icon
	Encyclopedia:
	EncyclopediaExtras:
		HideNotProducible: true

