^BaseWorld:
	TerrainLighting:

World:
	LuaScript:
		Scripts: campaign.lua, foothold.lua
	MissionData:
		Briefing: ———[    第六章引言    ]———\n\n当Scrin母舰燃烧着坠落天际时，\n其周边半机械人暴露了真正立场。\n被困于时空夹缝中的Scrin\n被诱导开启通往母星的传送门，\n而凯恩大军正驻于门前。\n\n尽管凯恩终极目标仍不明确，\nGDI绝不会坐视其行动。\n传送门虽仍开启，\n但稳定性正在快速恶化，\n极可能很快崩塌。\nGDI追击窗口所剩无几。\n\n———[    任务简报（GDI）   ]———\n\n我方部队已接近就绪。\n侦察无人机确认：\n传送门另一侧大气与气候条件\n可支持人类生存。\n\n显然，这是一片未知领域。\n我们必须先建立立足点，\n作为后续作战根基。\n目标区域附近Scrin活动极少，\n且尚未发现凯恩及其军队踪迹。\n\n凯恩离开后不久，\n我们侦测到来自Scrin信号发射器的能量激增。\n推测是传送门出口坐标被偏移所致。\n凯恩显然不想让我们紧随其后，\n但这也引出一个问题：\n他为何还要把“门”留着？\n\n当前传送门已过于不稳定，\n重型装备无法通过。\n不过自Scrin降临以来，\n我们对其虫洞技术的研究\n已让我们理解部分门控原理。\n\n维持传送门需要双向能流闭环。\n我方一侧已无问题，\n但若另一侧缺乏对应传输，\n传送门最终会失去凝聚。\n\nScrin神经中枢可提供该能流。\n若我们能在出口附近\n定位并夺取一座神经中枢，\n传送门就有望稳定。\n\n首要目标：\n在出口周边部署传感阵列。\n随后应可锁定合适神经中枢并实施夺取，\n从而让重型部队通行并建立基地。\n最后，清除区域内残余敌对力量。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: whatlurk

