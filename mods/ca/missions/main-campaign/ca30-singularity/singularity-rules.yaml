World:
	LuaScript:
		Scripts: campaign.lua, singularity.lua
	MissionData:
		Briefing: 我们已抵达Scrin主据点。\n其上空悬停着一艘巨型飞行器，\n正将某种能量注入地表。\n这很可能就是传送门开启机制。\n我们无法确定还剩多少时间，\n但必须在其任务完成前摧毁母舰。\n\n你首先要面对的是被奴役的人类军队。\nScrin将盟军、苏军与Nod部队\n作为第一道防线。\n必要时可直接歼灭，\n但也可能像解放我方部队那样\n将其从Scrin控制中释放。\n\n主据点外围防御正被持续强化，\n并消耗着极其庞大的能源。\n若无法对Scrin电力体系造成重创，\n几乎不可能突破其防线。\n\n母舰本体还受能量护盾保护。\n我方武器对其效能尚不明确。\n卫星图像同时显示\n大量半机械人部队在其周边护卫，\n地面强攻难度极高。\n\n为此，\n我方先进拦截机中队已准备打击母舰。\n我们判断其可短暂规避Scrin防空火力，\n并完成一次齐射。\n只能寄望这一轮打击\n足以击穿护盾。\n\n若仍不足以奏效，\n不惜一切代价压下护盾并摧毁母舰。\n整个GDI军火库均由你调度。\n\n祝你好运，指挥官。
