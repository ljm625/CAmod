World:
	LuaScript:
		Scripts: campaign.lua, intervention.lua
	MissionData:
		Briefing: 霍桑将军已通过传送门逃离，\n目前下落不明。\n审讯其一名副官后确认：\n他一直在暗中与苏军勾连，\n这也解释了GDI近期\n为何在协作上态度消极。\n\n也许他对凯恩与兄弟会的仇恨\n比外界认知更深，\n以至于扭曲了忠诚与判断；\n也可能他是另一名不幸的心控受害者。\n我们不认为这将是最后一次听到他的消息。\n\n通往Scrin母星GDI部队的传送链路\n已重新恢复，\n其领导层也重新掌控局面。\n急需补给已送达离星部队，\n更多我方特工联络亦已恢复。\n接下来，\n我们的注意力必须转回兄弟会。\n\n泰伯利亚净化装置落入尊王之手，\n迫使凯恩“解除Scrin依赖”的计划中断。\n原本可能起义的大量Scrin\n继续受制于尊王。\n与此同时，\nNod与叛军还需分兵对抗恶煞派Scrin，\n整体战线正持续后退。\n\n地球上的Nod部队目前与凯恩完全失联。\n我们判断他们正全力准备一座新传送门。\n菲律宾附近检测到异常集中的Nod兵力，\n并有目视证据证实其囤积了大规模泰伯利亚。\n上一次出现如此规模囤积，\n正是Scrin准备开启传送门之时。\n\n我方在该区存在薄弱。\n你需建立可持续增援的前进基地，\n以此为跳板打击Nod力量。\n泰伯利亚被储存在众多小岛筒仓内。\n你必须摧毁或夺取全部筒仓，\n以立刻排除Nod开门可能。\n\n当地资源稀缺，\n建议优先夺取而非摧毁筒仓，\n以获取额外资金。\n\n本次行动将获得韩国联盟伙伴支援。\n他们的黑鹰战机\n对夺取群岛上空制空权将极具价值。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: creep

