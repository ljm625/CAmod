^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, salvation.lua
	MissionData:
		Briefing: 那些“来访者”——Scrin——\n已为播撒泰伯利亚而占领一处半岛，\n那里生活着大量无辜民众。\n\n这些人的求救意料之中地被无视了。\n兄弟会是他们唯一的希望。\n他们的家园，甚至生命，\n如今都握在我们手中。\n\n率领一支分遣队解放这片半岛。\n让他们明白：\n在所有人都抛弃他们之后，\nNod兄弟会仍会保护他们。\n我确信，\n这将使许多人愿意加入我们的事业。\n\n由于Scrin控制着当地泰伯利亚矿区，\n你需要夺取本地油井来支撑行动经费。
	MapOptions:
		ShortGameCheckboxEnabled: False
		TechLevel: medium
	MusicPlaylist:
		StartingMusic: chrg226m

