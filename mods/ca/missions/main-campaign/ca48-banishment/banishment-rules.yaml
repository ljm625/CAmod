# Misc

STLK:
	Cloak@NORMAL:
		CloakDelay: 750
		RequiresCondition: !cloak-force-disabled && !being-warped && !parachute
	GrantTimedCondition@Uncloaked:
		RequiresCondition: !hidden
	DummyConditionConsumer@cloak-active:
		Condition: cloak-active
	DummyConditionConsumer@cloak-charging:
		Condition: cloak-charging

FLARE:
	RevealsShroud:
		Range: 12c0

LST.MCV:
	Inherits: LST
	-Buildable:
	RenderSprites:
		Image: lst
	Cargo:
		InitialUnits: mcv

WCHR:
	AutoTarget:
		InitialStanceAI: AttackAnything

MCV:
	Buildable:
		Prerequisites: vehicles.mcv, ~vehicles.ra, ~mcv.allowed

mcv.allowed:
	Inherits@DUMMY: ^InvisibleDummy
	ProvidesPrerequisite:

HOSP:
	PeriodicProducerCA@Initial:
		Type: Hospital
		ChargeDuration: 9999999
		InitialChargeDuration: 5
		Actors: medi, medi
		RequiresCondition: !is-neutral && !first-base-secured
		ResetTraitOnOwnerChange: true
	PeriodicProducerCA@MEDIC:
		RequiresCondition: !is-neutral && !scrinplayer && !owned-by-ai && first-base-secured
	PeriodicProducerCA@REJUVENATOR:
		RequiresCondition: !is-neutral && scrinplayer && !owned-by-ai && first-base-secured
	GrantConditionOnPrerequisite@FirstBaseSecured:
		Prerequisites: first.base.secured
		Condition: first-base-secured

HOSP.Rebuilt:
	-PeriodicProducerCA@Initial:

MACS:
	PeriodicProducerCA@Initial:
		Type: Macs
		ChargeDuration: 9999999
		InitialChargeDuration: 5
		Actors: mech, mech
		RequiresCondition: !is-neutral && !first-base-secured
		ResetTraitOnOwnerChange: true
	PeriodicProducerCA@MECHANIC:
		RequiresCondition: !is-neutral && !scrinplayer && !owned-by-ai && first-base-secured
	PeriodicProducerCA@ARTIFICER:
		RequiresCondition: !is-neutral && scrinplayer && !owned-by-ai && first-base-secured
	GrantConditionOnPrerequisite@FirstBaseSecured:
		Prerequisites: first.base.secured
		Condition: first-base-secured

MACS.Rebuilt:
	-PeriodicProducerCA@Initial:

