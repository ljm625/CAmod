^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: ca|missions/main-campaign/ca47-ad-nihilum/dartmoor.pal
	FlashPostProcessEffect@LIGHTNINGSTRIKE:
		Type: LightningStrike
	WeatherOverlay@RAIN:
		WindTick: 150, 550
		UseSquares: false
		ScatterDirection: 0, 0
		Gravity: 20, 25
		SwingOffset: 0, 0
		SwingSpeed: 0, 0
		SwingAmplitude: 0, 0
		ParticleColors: 72aaae, 72aea6, 5caea3, 6da69f
		LineTailAlphaValue: 30
		ParticleSize: 1, 1
		ParticleDensityFactor: 10
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1.1
		Ambient: 0.8

^BaseWorld:
	TerrainLighting:

World:
	LuaScript:
		Scripts: campaign.lua, banishment.lua
	MissionData:
		Briefing: 恶煞派Scrin的星际传送门已被定位。\n达默河沿岸我方四座基地遭全面攻破，\n部队被迫撤离该区域。\n\n我们的判断是：\n只要能把恶煞派力量击退并关闭该传送门，\n其在地球的存在就将被根除。\n必须在更多“虚空引擎”穿门而来前\n完成此事。\n\n该区域已建立了异常高密度的神经中枢。\n若要关闭传送门，\n这些神经中枢必须全部摧毁。\n\n清除盘踞其中的恶煞派部队，\n收复并重启我方失陷基地；\n随后定位并摧毁全部Scrin神经中枢。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: drill

Player:
	PlayerResources:
		DefaultCash: 6000
	ProvidesPrerequisitesOnTimeline:
		PauseOnCondition: !first-base-secured
	ExternalCondition@FirstBaseSecured:
		Condition: first-base-secured
	ProvidesPrerequisite@FirstBaseSecured:
		Prerequisite: first.base.secured
		RequiresCondition: first-base-secured

