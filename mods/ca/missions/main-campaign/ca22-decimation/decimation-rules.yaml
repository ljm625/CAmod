# Triggered access to Reaper Tripods, Enervators, Devastators, Carriers

RTPD:
	Buildable:
		Prerequisites: scrt, ~vehicles.scrin, ~reaperaccess

ENRV:
	Buildable:
		Prerequisites: scrt, ~aircraft.scrin, ~fleetaccess

DEVA:
	Buildable:
