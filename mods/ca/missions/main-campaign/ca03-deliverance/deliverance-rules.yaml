^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, deliverance.lua
	MissionData:
		Briefing: 我们已收到一支自称\n“全球防卫组织”（GDI）部队的联络。\n虽然我们对该组织一无所知，\n但有理由相信他们能解释近期异变。\n\n一座GDI基地似乎凭空出现在苏联境内。\n其指挥官已被俘，\n基地也即将被苏军碾压。\n\n率领分遣队前往该基地。\n若这不是苏联设下的陷阱，\n就坚持防守到增援抵达。\n\n由于指挥官被捕，\n再加上时空与维度动荡造成的指挥链混乱，\nGDI部队已同意接受你的指挥。\n待我方阵地稳固后，\n立即定位并营救GDI指挥官。\n\n我们尚不能完全信任这些人，\n务必保持警惕。\n若能成功救回其指挥官，\n将是稳固这段潜在同盟关系的第一步。
		LossVideo: battle.vqa
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: aoi

Player:
	PlayerResources:
		DefaultCash: 3500

