^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: ca|missions/main-campaign/ca21-incapacitation/incapacitation.pal
	FlashPostProcessEffect@LIGHTNINGSTRIKE:
		Type: LightningStrike
	FlashPostProcessEffect@IONSTRIKE:
		Type: IonStrike
		Color: D48FFF
	TintPostProcessEffect:
		Red: 1.2
		Green: 1
		Blue: 1.2
		Ambient: 0.7

World:
	LuaScript:
		Scripts: campaign.lua, incapacitation.lua
	MissionData:
		Briefing: 已确认该区域集结了\n同属那两个人类阵营的大量空中单位，\n并被评估为我方下一阶段必须清除的重大威胁。\n\n你将获得一支小型特遣队，\n任务是歼灭这些航空器及其起降设施。\n\n你还必须摧毁全部防空建筑。\n如此可确保我方舰队回撤中央储备库时\n遭遇最小化的空中阻力。\n\n我们已制造离子风暴，\n以确保任务期间敌方航空器被压制在地面。\n维持风暴所需能量极高，\n不要浪费时间。
	MapOptions:
		ShortGameCheckboxEnabled: False
	ScriptLobbyDropdown@RESPAWN:
		ID: respawn
		Label: Respawns
		Description: Enable/disable respawning on death
		Values:
			enabled: Enabled
			disabled: Disabled
		Default: disabled
		DisplayOrder: 999
	MusicPlaylist:
		StartingMusic: rainnite

Player:
	PlayerResources:
		DefaultCash: 0

^GroundedAircraft:
	ExternalCondition@GROUNDED:
		Condition: grounded
	AutoTarget:
		InitialStanceAI: HoldFire
	DamageMultiplier@GROUNDED:
		Modifier: 200
		RequiresCondition: grounded

ORCA:
	Inherits@GROUNDED: ^GroundedAircraft
	-SpawnActorOnDeath:

A10:
	Inherits@GROUNDED: ^GroundedAircraft
	-SpawnActorOnDeath:

HELI:
	Inherits@GROUNDED: ^GroundedAircraft
	WithIdleOverlay@ROTORGROUND:
		PauseOnCondition: grounded
	-SpawnActorOnDeath:

HARR:
	Inherits@GROUNDED: ^GroundedAircraft
	-SpawnActorOnDeath:

AURO:
	Inherits@GROUNDED: ^GroundedAircraft
	-SpawnActorOnDeath:

WORMHOLE:
	-Targetable:

GRAV:
	Power:
		Amount: 0

^DifficultyModifiers:
	Inherits@ActorDifficultyConditions: ^ActorDifficultyConditions
	RevealsShroudMultiplier@NORMALEASY:
		Modifier: 115
		RequiresCondition: difficulty-normal || difficulty-easy

STMR:
	Inherits@CAMPAIGNDISABLED: ^Disabled

DEVA:
	Inherits@CAMPAIGNDISABLED: ^Disabled

PAC:
	Inherits@CAMPAIGNDISABLED: ^Disabled

MSHP:
	Inherits@CAMPAIGNDISABLED: ^Disabled

S4:
	Inherits@DIFFICULTY: ^DifficultyModifiers
	RevealsShroud:
		Range: 8c0
	PortableChronoCA:
		MaxDistance: 8
		ChargeDelay: 200
	AutoTarget:
		InitialStance: HoldFire
	GainsExperienceMultiplier@TenPercentXp:
		Modifier: 10

LCHR:
	Inherits@DIFFICULTY: ^DifficultyModifiers
	RevealsShroud:
		MinRange: 0
		Range: 8c0
		-RevealGeneratedShroud:
	-RevealsShroud@GAPGEN:
	RangeMultiplier@REDUCEDRANGE:
		Modifier: 94
	AutoTarget:
		InitialStance: HoldFire
	GainsExperienceMultiplier@TenPercentXp:
		Modifier: 10
	TooltipExtras:
		Attributes: • Disables power plants and radars\n• Slows vehicles & cyborgs\n• Regenerates and heals allies when in coalescence form\n• Special Ability: Coalescence

LCHR.Orb:
	Health:
		HP: 15000
	ReloadAmmoPoolCA:
		Delay: 250
