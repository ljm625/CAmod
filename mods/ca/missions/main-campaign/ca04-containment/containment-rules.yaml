World:
	LuaScript:
		Scripts: campaign.lua, containment.lua
	MissionData:
		Briefing: 情报显示，苏军正准备以核武器打击\n已破裂的超时空传送仪，\n试图终止其持续造成的破坏。\n他们并不清楚自己面对的是什么。\n一旦成功，后果可能是灾难性的。\n\n我们已无时间发动全面进攻，\n最佳方案是实施一场小规模隐秘行动，\n摧毁他们的导弹发射井。\n\n该区域大部分苏军正忙于对抗外星入侵，\n因此本地基地防备空虚。\n若行动顺利，\n等他们意识到威胁时已来不及反应。\n\n我们也已准备好自己的“遏制方案”。\n只要能阻止苏军发射，\n就可以立刻进行实战测试。\n\n首先，摧毁为苏军特斯拉线圈供电的\n三座原子反应堆，\n让突击队绕过其余防线。\n\n接着，清除沿岸SAM防空阵地，\n为遏制行动打开通路。\n\n第三步，摧毁两座准备发射的导弹井。\n\n随后我们将投入实验性武器。\n护送其抵达超时空传送仪并摧毁。
	MapOptions:
		ShortGameCheckboxEnabled: False
	ScriptLobbyDropdown@RESPAWN:
