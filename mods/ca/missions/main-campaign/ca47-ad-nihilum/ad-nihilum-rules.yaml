^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: ca|missions/main-campaign/ca47-ad-nihilum/dartmoor.pal
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1
		Ambient: 0.85

^BaseWorld:
	TerrainLighting:

World:
	LuaScript:
		Scripts: campaign.lua, ad-nihilum.lua
	MissionData:
		Briefing: 我们收到来自Scrin母星GDI总部\n一则紧急且极其不安的通报。\n其一座原本仍在抵挡恶煞派Scrin进攻的基地\n检测到巨大雷达信号正缓慢逼近。\n尚未完成目视确认前，\n整座基地便被瞬间摧毁。\n\n恶煞派Scrin至今仍阻止GDI近距侦察，\n但可以肯定：\n那是火力极端恐怖的战争机器，\n甚至可能超过尊王部署的灭绝者三足机甲。\n\n我们有理由相信，\n数量未知的该类机器\n已抵达地球。\n我方将其命名为“虚空引擎（Void Engines）”。\nGDI已探测到它们通过一座\n指向地球的星际传送门移动。\n\nGDI报告称，\nScrin叛军在试图拦截其中一台时\n遭受毁灭性损失。\n目前尚不清楚尊王或苏军\n是否已与其交战。\n除破坏力外，\n其真正用途也仍未知。\n\n地球上目前尚无其直接目击记录，\n我们也仍未定位其所用星际传送门。\n但已确认该区存在显著恶煞派Scrin活动，\n并发现三座异常巨大的传送门。\n它们能级不足以承担星际跃迁，\n尺寸却异常夸张——\n很可能正是为让这些巨型机器通行。\n\n这些传送门位于德国柏林以南，\n即盟军领土核心。\n柏林撤离已在进行，\n但我方南侧多座基地已失联，\n说明时间所剩无几。\n若柏林正是其目标，\n我们必须不惜代价阻止其抵达城市。\n\n在“虚空引擎”突破你防线前将其摧毁。\n待兵力充足后，\n摧毁当地Scrin基地并夺控其传送门。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: malev

Player:
	PlayerResources:
		DefaultCash: 6000

