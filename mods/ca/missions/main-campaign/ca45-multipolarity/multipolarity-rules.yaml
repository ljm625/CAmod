World:
	LuaScript:
		Scripts: campaign.lua, multipolarity.lua
	MissionData:
		Briefing: 我方间谍已完成汇报，\n盟军最高指挥部紧急会议也刚刚结束。\n\n第三Scrin派系身份已明确：\n他们是被尊王放逐的古老教团，\n在其他Scrin中被称为“恶煞派（Malefic）”。\n随着尊王统治动摇，\n他们卷土重来，\n并已在Scrin母星取得显著进展。\n其本质与动机仍不清晰，\n但其推进方式极端残酷。\n\n我们还获悉GDI内部疑似发生政变。\n其最高级指挥官与大批主力\n仍滞留Scrin母星，\n霍桑将军趁机接管地球上的GDI部队，\n并在其辖区全面实施戒严。\n\n霍桑声称前往Scrin母星的GDI部队\n已与宿敌凯恩同流合污，\n这是不可饶恕的背叛。\n显然，\nGDI高层内部对于是否暂时搁置与凯恩矛盾\n存在分歧。\n霍桑也刻意淡化尊王威胁，\n并不认为叛军取胜一定有利。\n他还认为净化泰伯利亚\n并非凯恩宣称的“赐福”，\n而是某个复杂计划的一环。\n\n我们对兄弟会认知依旧有限，\n但盟军高层中确有人同情霍桑立场。\n目前这类声音尚非主流，\n至少现在还不是。\n\n会议一致认定：\n地球安全必须置于首位。\n恶煞派Scrin与苏联-尊王联盟\n都对人类构成生存级威胁。\n因此，\n我们的核心目标是控制并最终关闭\n所有仍与Scrin母星相连的传送门，\n并阻止新的传送门再被开启。\n\n苏军传送门已关闭。\n我们已知仅余一座，\n即由Scrin母舰开启的那座。\n霍桑部队正完全控制该门，\n阻止任何离星部队返回地球。\n\n与霍桑谈判已彻底无果。\n以武力夺取传送门的行动\n已获批准。\n我方旧基地，\n以及Nod与苏军曾建立的基地，\n目前均已退役并由GDI驻防。\n若能夺回这些基地，\n将显著减轻对GDI主基地的突击难度。\n\n你的任务是确保传送门并夺取\n霍桑将军指挥中心。\n届时GDI真正领导层即可返回地球，\n随后我们便能永久封门。\n\n瑞典联盟伙伴将支援本次行动。\n其冷冻系武器\n对削弱GDI重装甲应极为有效。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: prp

