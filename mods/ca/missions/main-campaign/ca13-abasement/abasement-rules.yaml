^Palettes:
	FlashPostProcessEffect@LIGHTNINGSTRIKE:
		Type: LightningStrike
	WeatherOverlay@RAIN:
		WindTick: 150, 550
		UseSquares: false
		ScatterDirection: 0, 0
		Gravity: 20, 25
		SwingOffset: 0, 0
		SwingSpeed: 0, 0
		SwingAmplitude: 0, 0
		ParticleColors: 72aaae, 72aea6, 5caea3, 6da69f
		LineTailAlphaValue: 30
		ParticleSize: 1, 1
		ParticleDensityFactor: 10
	TerrainLighting:
	TintPostProcessEffect:
		Red: 1.22
		Green: 1.27
		Blue: 1.15
		Ambient: 0.55

World:
	LuaScript:
		Scripts: campaign.lua, abasement.lua
	MissionData:
		Briefing: 将军同志，\n我们终究还是晚了一步，\n没能阻止疯子凯恩放出他的新型半机械人大军。\n我军因此遭受了灾难性失败。\n\n各条战线局势都十分严峻。\n盟军及其GDI盟友\n已恢复对我西部领土的进攻；\n而外星入侵者也在有泰伯利亚的地区\n持续通过虫洞涌入。\n\n凯恩军队却突然停止推进，\n并向我们提出交易：\n若我们协助兄弟会夺回\n被Scrin占据的领土，\n并夺取其一座信号发射器，\n凯恩将承诺停止对我方敌对行动。\n\n目前我们别无选择。\n\n在现被Scrin占据的前Nod领地建立基地。\n只要夺回他们废弃基地，\nNod就会提供增援。\n扩充兵力，\n夺取确认建在该区域内的信号发射器。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: tren226m

Player:
	PlayerResources:
		DefaultCash: 6000

