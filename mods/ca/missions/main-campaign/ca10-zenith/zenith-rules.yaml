^Palettes:
	TintPostProcessEffect:
		Red: 0.8
		Green: 0.8
		Blue: 1
		Ambient: 0.9
	WeatherOverlay:
		ParticleDensityFactor: 16
		Gravity: 16, 24
		WindTick: 150, 425
		ScatterDirection: -12, 12
		ParticleSize: 2, 3
		ParticleColors: ECECEC44, E4E4E444, D0D0D044, BCBCBC44
		LineTailAlphaValue: 0

World:
	LuaScript:
		Scripts: campaign.lua, zenith.lua
	MissionData:
		Briefing: 尽管我已做出保证，\n苏军仍对圣殿主基地发起大规模进攻。\n斯大林一向是个目光短浅的蠢货。\n\n为确保圣殿安全，\n我们必须让苏军核武库失去作用。\n我的线人称，苏军计划先发射导弹\n摧毁我方大部分防御力量，\n再用坦克推进清剿残存部队。\n\n苏军导弹井位于一座重兵设防的岛屿。\n我们当前并不占据理想攻击位置，\n但随着苏军主力南下，\n应可在海岸建立集结点，\n并在其增援到来前强攻该岛。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: smsh226m

Player:
	PlayerResources:
		DefaultCash: 6000

