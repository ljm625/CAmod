World:
	LuaScript:
		Scripts: campaign.lua, schism.lua
	MissionData:
		Briefing: 主宰向我们表示感谢，\n并正整编部队准备新一轮攻势。\n\n凯恩用于扭曲泰伯利亚、\n服务其邪恶目的的装置，\n已在一处叛军要塞中被定位。\n其净化波每次释放都更加强大，\n影响范围持续扩大，\n导致无数Scrin转投这名欺诈者凯恩。\n照此发展，叛军很快将势不可挡。\n\n主宰无法冒险让大军靠近该装置，\n但我们已有方案。\n我们发现：\n我方铁幕可抵御净化能量，\n而Scrin护盾却做不到。\n基于这一点，\n主宰将提供一台所剩无几的灭绝者三足机甲，\n用于突击叛军要塞。\n我方铁幕会与净化波同步，\n理论上可让灭绝者突破防御、\n抵达装置，\n再通过Scrin虫洞将其回收。\n\n这正是凯恩来到这个世界所追寻的战利品。\n我们判断其力量远超已知表现。\n如此力量绝不能留在他手中。\n主宰必须掌控该装置，\n才能以其力量重建秩序。\n凯恩必然会在此背水一战，\n否则他此前所有努力都将付诸东流。\n预计敌方抵抗将极为激烈。\n\n我们已集结所能调动的兵力，\n但先前建立基地的尝试\n因持续袭击而受阻。\n已无时间继续准备。\n立刻发起进攻，\n护送灭绝者抵达装置并为主宰夺取它。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: hm2

