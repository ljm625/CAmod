^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: alien.pal
	TintPostProcessEffect:
		Red: 1.3
		Green: 1
		Blue: 1.5
		Ambient: 0.5

^BaseWorld:
	TerrainLighting:

World:
	LuaScript:
		Scripts: campaign.lua, spearhead.lua
	MissionData:
		Briefing: 看来Scrin舰队的目标并非我们。\n朝其前进方向派出的侦察队\n在一片山地、低密度居民区发现了Nod前哨。\n目前我们仍未定位Nod主力，\n但凯恩不可能离得太远，\nScrin显然正试图逼近他。\n受地形限制，\n我方重装部队需要一段时间\n才能机动拦截。\n\n我们需要更多关于凯恩位置与意图的情报，\n以便制定后续行动。\n我们判断这处Nod前哨\n可被一支快速部署的小型突击队攻破。\n当地资源有限、\n适合作为集结区的位置也不多，\n但Scrin活动稀少且地形复杂，\n你预计只会遭遇有限阻力。\n\n你的任务是夺取Nod通讯中心。\n其余行动由你自行裁量。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: heroism

Player:
	PlayerResources:
		DefaultCash: 6000

# Disable tech

AFLD.GDI:
	-InterceptorPower@AirDef:

HQ:
	-DropPodsPowerCA@Zocom:
	-AirstrikePowerCA@uav:
	-AirstrikePowerCA@uavST:

EYE:
	Inherits@CAMPAIGNDISABLED: ^Disabled

upgc.drop:
	Inherits@CAMPAIGNDISABLED: ^Disabled

# Enable subfaction specific tech

XO:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

WOLV:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

PBUL:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

STWR:
	Buildable:
		Prerequisites: vehicles.any, ~structures.gdi

ionmam.upgrade:
	Buildable:
		Prerequisites: upgc, !mdrone.upgrade, !hovermam.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

hovermam.upgrade:
	Buildable:
		Prerequisites: upgc, !ionmam.upgrade, !mdrone.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

mdrone.upgrade:
	Buildable:
		Prerequisites: upgc, !ionmam.upgrade, !hovermam.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

