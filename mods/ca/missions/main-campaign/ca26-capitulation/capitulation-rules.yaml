World:
	LuaScript:
		Scripts: campaign.lua, capitulation.lua
	MissionData:
		Briefing: 通往Scrin主据点的道路现已打通，\n我方总攻准备正在进行。\n斯大林这张“未知牌”不能忽视，\n我们决定将其从战局中彻底移除。\n\n他已退守西伯利亚一处重防御要塞，\n并以最忠诚、最有经验的部队拱卫自身。\n苏军地面军在近期Scrin入侵中损失惨重，\n但其空军体系基本完整，\n预计斯大林会大量投入空军作战。\n\n其据点防御极其严密，\n关键建筑受一台铁幕装置保护，\n该装置必定隐藏在地下。\n\n基地主要电力来自一座原子反应堆。\n盟军间谍回报称，\n该反应堆需要持续燃料补给\n以维持全基地巨额耗电。\n若我们切断补给线，\n阻止新燃料送达，\n反应堆被迫停机只是时间问题。\n\n基地还依赖附近岛屿的一组磁能反应堆\n作为次级电源。\n这些反应堆可为基地磁暴线圈超载供能，\n在突击主据点前必须先予摧毁。\n\n我们上次围攻配备铁幕的苏军基地\n结果并不理想；\n但愿这次盟军情报足够准确。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: fac2226m

