World:
	LuaScript:
		Scripts: campaign.lua, conspiracy.lua
	MissionData:
		Briefing: 盟军对我们北非研究设施的突袭\n来得比预期更快。\n尽管大部分资产已安全转移，\n仍有两名极其重要的研究员被俘。\n\n我不怀疑他们对兄弟会的忠诚，\n但被俘本身不可接受。\n任何情报落入敌手都会危及我们的计划。\n\n你的任务有两个。\n关押研究员地点附近有一座GDI基地。\n我们的一支潜伏小组近期已就位，\n并准备夺取该基地控制权。\n你先率小股兵力牵制并削弱GDI，\n时机成熟后，\n我们的兄弟就会公开身份并接管局面。\n\n基地到手后，\n立即找到被俘同袍并把他们带回。\n\n即便盟军未必怀疑GDI明叛，\n这次严重失守也足以让他们重新评估\n双方未来的合作深度。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: nomercy

Player:
	PlayerResources:
		DefaultCash: 6000

