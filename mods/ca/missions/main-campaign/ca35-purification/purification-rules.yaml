World:
	LuaScript:
		Scripts: campaign.lua, purification.lua
	MissionData:
		Briefing: 我们在此地任务的最终阶段开始了。\n我一直知道，\n泰伯利亚是开启人类潜能的钥匙，\n但我过去的理解并不完整。\n如今我们熟悉的绿色晶体，\n本质上其实是被扭曲的畸变体。\n\n数千年前，\nScrin在这个世界发现了泰伯利亚。\n它曾开启一个辉煌的进步与和平时代，\n围绕资源与领土的战争逐渐消退。\n但早期形态的晶体并不具备\n如今这种强扩散性，\n资源稀缺一度威胁要逆转既有进步。\n\n为提升泰伯利亚增殖速率，\n他们展开了实验，\n并最终取得成功。\n但代价同样巨大。\n晶体虽然扩散更快，\n却会释放一种辐射，\n导致Scrin生理结构改变。\n暴露会带来依赖，继而成瘾。\n\n曾有人警告风险过高，\n却被噤声。\n绿色晶体推动了Scrin文明发展，\n也被一部分人视为控制工具。\n对多数Scrin而言，\n失去泰伯利亚往往意味着死亡。\n因此掌控其生产者便掌握了绝对权力。\n最终，一位最高统治者崛起——主宰，\n自此统御Scrin至今。\n\n零散反抗力量随之出现。\n他们秘密进行实验，\n试图消除绿色晶体负面效应，\n却遭到残酷追猎。\n在意识到难以逆转局面后，\n他们选择将研究成果隐藏，\n等待未来某天被重新发现，\n以解放Scrin。\n\n他们匆忙将数据存储装置\n送往可能成为未来采集目标的行星，\n并附带少量泰伯利亚样本。\n当时已造出可净化泰伯利亚的装置，\n但完成得太晚，\n反抗者也没有足够晶体为其供能。\n\n当主宰军队逼近时，\n反抗者藏起装置并接受了命运。\n\n所以，指挥官，\n我们来此并非为征服，\n而是为拯救。\n主宰及其拥趸统治Scrin数千年，\n以民众对泰伯利亚的依赖，\n以及“断供”威胁，\n作为无限专权的借口。\n而现在，\n我们已拥有终结这场暴政的手段。\n\n我们必须将装置提升至全功率。\n当足够多Scrin摆脱泰伯利亚依赖，\n并看清真相后，\n自由与奴役之间的抉择，\n才会真正回到他们自己手中。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: elusive

