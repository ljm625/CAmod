World:
	LuaScript:
		Scripts: campaign.lua, mobilization.lua
	MissionData:
		Briefing: 对泰伯利亚储存设施的突袭\n为我们争取了宝贵时间，\n最终总攻准备已在展开。\n我们从Scrin心灵控制下解救的部队\n提供了关键情报，\n看来此前判断是正确的：\nScrin已与母星断联，\n正试图开启一座星际传送门。\n他们囤积泰伯利亚，\n正是为此提供巨量能量。\n\nScrin主据点已被定位，\n我们也在集结一切可用兵力。\n凯恩似乎又一次“消失”了；\n而随着斯大林死亡，\nNod与苏军临时领导层已同意停战，\n以共同应对外星威胁。\n双方指挥官正于前线附近一处指挥站会晤。\n\n[ 收到来讯 ]\n\nScrin似乎已察觉我方计划。\n指挥站报告称，\n该区域多处出现Scrin虫洞，\n我方增援通道正被切断。\n\n守住指挥站。\n增援会间歇到达，\n但你必须尽快摧毁这些虫洞，\n否则将被敌军淹没。\n祝你好运。
