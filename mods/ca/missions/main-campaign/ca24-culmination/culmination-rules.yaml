# Misc

WORMHOLE.Exit:
	Inherits: ^WormholeBase
	RenderSprites:
		Image: wormhole
	Immobile:
		OccupiesSpace: false
	Health:
		HP: 300000

MAST:
	GainsExperienceMultiplier@ThirdXp:
		Modifier: 33

PDGY:
	GrantExternalConditionPowerCA@Subjugation:
		OrderName: subjugation
		Icon: subjugation
		IconPalette: chromes
		ChargeInterval: 125
		ExplosionWeapon: SubjugationSpawner
		Name: Subjugation
		Condition: subjugated
		Range: 18c0
		MinTargets: 1
		ValidTargets: Infantry, Vehicle, Ship, Structure
		ValidRelationships: Enemy
		Duration: 25
		AllowMultiple: false
		Description: \n永久心灵控制目标区域内单位和建筑。
		OnFireSound: mastermind-fire.aud
		SelectTargetSpeechNotification: SelectTarget
		SelectTargetTextNotification: Select target.
		InsufficientPowerSpeechNotification: InsufficientPower
		EndChargeSpeechNotification: SubjugationReady
		EndChargeTextNotification: Subjugation ready.
		DisplayRadarPing: True
		Cursor: mc-capture
		SupportPowerPaletteOrder: 0
		ShowTargetCircle: true
		ShowSelectionBoxes: true
		TargetTintColor: a400f233
		TargetCircleColor: a400f2cc
		SelectionBoxColor: a400f2
		OneShot: true

subjugation.dummy:
	Interactable:
		Bounds: 64, 64
	ScriptTriggers:
	RenderSprites:
		Image: empty
	WithSpriteBody:
	ClassicFacingBodyOrientation:
		QuantizedFacings: 1
	HiddenUnderFog:
		Type: GroundPosition
	HitShape:
	Immobile:
		OccupiesSpace: false
	PeriodicExplosion:
		Weapon: SubjugationEffect
	KillsSelf:
		Delay: 25

^Infantry:
	ExternalCondition@Subjugatable:
		Condition: subjugated
	WithColoredOverlay@Subjugated:
		RequiresCondition: subjugated
		Color: a400f233

^Building:
	ExternalCondition@Subjugatable:
		Condition: subjugated
	WithColoredOverlay@Subjugated:
		RequiresCondition: subjugated
		Color: a400f233

^Vehicle-NOUPG:
	ExternalCondition@Subjugatable:
		Condition: subjugated
	WithColoredOverlay@Subjugated:
		RequiresCondition: subjugated
		Color: a400f233

