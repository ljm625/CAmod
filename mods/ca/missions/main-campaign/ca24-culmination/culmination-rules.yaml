	Buildable:
		Prerequisites: scrt, ~vehicles.scrin

ATMZ:
	Buildable:
		Prerequisites: scrt, ~vehicles.scrin

ENRV:
	Buildable:
		Prerequisites: scrt, ~aircraft.scrin

stellar.upgrade:
	Buildable:
		Prerequisites: scrt

coalescence.upgrade:
	Buildable:
		Prerequisites: scrt

