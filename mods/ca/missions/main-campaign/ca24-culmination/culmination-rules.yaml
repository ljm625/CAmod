
^Palettes:
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1.2
		Ambient: 0.8
	PaletteFromFile@terrain-temperat:
		Filename: ca|missions/main-campaign/ca24-culmination/brown.pal
	FlashPostProcessEffect@Subjugation:
		Type: Subjugation
		Color: a400f2

World:
	LuaScript:
		Scripts: campaign.lua, culmination.lua
	MissionData:
		Briefing: 半机械人大军现已受我方控制。\n我方Mastermind力量大幅增长，\n已进化为Prodigy，\n并取代尤里成为这支机械军的主宰。\n尤里已被关押，\n后续或可派上用场。\n\n半机械人几乎足以确保\n我们在此地达成首要目标，\n但我们不能留下任何变数。\nProdigy已积累了巨量心灵能量，\n监督者认为应通过进一步征服人类部队\n彻底抹除失败可能。\n\n我们已将三个人类弱势阵营诱入陷阱。\n他们误以为Prodigy脆弱可击，\n并有机会将其消灭；\n但实际上，Prodigy可在远距离\n直接接管整座基地。\n由你判断先控制哪一方最合适。\nProdigy此能力仅可发动一次，\n随后需暂时离场恢复。\n因此另外两方需要以更渐进方式逐步征服。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: timebomb

Player:
	PlayerResources:
		DefaultCash: 6000

