World:
	LuaScript:
		Scripts: campaign.lua, encroachment.lua
	MissionData:
		Briefing: 你的表现令监督者满意，\n并被认定可承担更高级别指挥职责。\n在母星增援缺席的情况下，\n我们现在必须着手稳固\n中央浆液储备库周边领土。\n\n我方舰队主力正与人类交战，\n这为我们发动地面突击\n打击两个高优先级目标提供了机会。\n\n已观测到两个人类阵营协同作战，\n并动用两类高威胁进攻资产：\n轨道武器平台，\n以及可操纵局部气象制造风暴的装置。\n\n若中央储备库暴露，\n他们必会将这些武器用于打击我方。\n必须将其摧毁，\n彻底消除这一风险。
	MapOptions:
		ShortGameCheckboxEnabled: False
