^Palettes:
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1
		Ambient: 1
	PaletteFromFile@terrain-temperat:
		Name: terrain
		Tileset: TEMPERAT
		Filename: ca|missions/main-campaign/ca43-dissection/basejungle.pal
		ShadowIndex: 3, 4

World:
	LuaScript:
		Scripts: campaign.lua, dissection.lua
	MissionData:
		Briefing: 与苏军实现和平的希望几乎已经破灭。\n斯大林潜在继任者中\n那些相对愿意外交接触的人，\n已被新任总理安托利·切尔登科清除。\n此人在疯狂追逐更大权力时做出了不可想象之举：\n与Scrin尊王结盟，\n并显然阻止了尊王被叛军击败。\n\n当GDI、Nod与Scrin\n在Scrin母星鏖战时，\n苏军实施了大规模重整军备计划。\n如今在尊王援助下，\n他们再次公开发动战争。\n\n我们与GDI关系也在恶化。\n官方说法是：\n尤里与Scrin 夺魂师逃脱后，\n他们已不再信任我们处理安防事务。\n这说辞充满虚伪，\n我们怀疑他们在隐瞒某些事，\n并借此推责。\n但当前我们承受不起同盟破裂，\n因此暂且压下疑虑。\n\n另有令人不安的报告指出：\n出现了第三个Scrin派系，\n并在无差别作战。\n他们似乎已建立通往地球的传送门，\n但尚待最终确认。\n\n我们正同时应对多线敌人，\n资源已逼近极限。\n盟军最高指挥部原定召开会议\n讨论后续战略，\n但眼下有一场局势正在恶化，\n必须立刻处理。\n\n苏军已自希腊一路南压至地中海沿岸。\n其目标似乎是土耳其——\n这是对其母星传送门实施打击\n唯一现实的前进跳板。\n\n我方在土耳其部队现已完全被切断并遭合围。\n我们不能让苏军建立缓冲区，\n将其传送门置于我方打击范围之外，\n否则尊王军势将继续源源涌入。\n\n苏军持续轰炸与火箭压制下，\n其突出部两侧我方阵地正快速崩溃，\n急需增援。\n接管尚存兵力，\n将苏军压回去。\n\n该区频繁轰炸由大量苏军雷达站协同引导。\n优先瘫痪这些雷达站。\n\n此外，\n尽管希腊在盟军内部并非强权，\n他们近来研发了若干出色新式武器，\n本次行动中或将非常有用。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: shut_it

