^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: alien.pal
	WeatherOverlay:
		ParticleDensityFactor: 4
		Gravity: 8, 16
		WindTick: 150, 425
		ScatterDirection: -12, 12
		ParticleSize: 2, 3
		ParticleColors: 00000066, 11111166, 22222266
		LineTailAlphaValue: 0
	TintPostProcessEffect:
		Red: 0.9
		Green: 0.9
		Blue: 1.1
		Ambient: 0.65
	FixedColorPalette@BlueTiberium:
		Color: ffffff

^BaseWorld:
	TerrainLighting:
	ResourceRenderer:
		ResourceTypes:
			BlueTiberium:
				Name: 净化泰伯利亚


^BasePlayer:
	PlayerResources:
		ResourceValues:
			BlueTiberium: 25

World:
	LuaScript:
		Scripts: campaign.lua, annexation.lua
	MissionData:
		Briefing: 传送门已在我方控制下，\n凯恩已被阻止返回地球。\n我军现已准备前往Scrin母星，\n协助尊王击败叛军并消灭凯恩。\n\n传送门另一侧存在一座Nod基地。\n凯恩可能会在此固守，\n但更可能像以往一样遁入暗处。\n无论如何，\n我方首要任务是建立作战基地并稳控周边区域。\n此外还必须夺取附近神经中枢，\n确保传送门持续开启。\n\n我们将深入叛军腹地作战，\n不要指望尊王能直接支援你。\n在此开辟新战线，\n应可分担其在星球其他区域所承受的压力。\n\n清剿你遭遇的一切Nod或叛军部队。\n向尊王证明：\n我们是多么强大的盟友。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: phatatta

Player:
	PlayerResources:
		DefaultCash: 6000

# Purified Tib doesn't damage infantry

^Infantry:
	DamagedByTerrain@TIBDAMAGE:
		Terrain: Tiberium

# Disable tech

MSHP:
	Inherits@CAMPAIGNDISABLED: ^Disabled

imppara.upgrade:
	Inherits@CAMPAIGNDISABLED: ^Disabled

# Disable powers

^SpyPlanePower:
	AirstrikePowerCA@spyplane:
		Prerequisites: ~disabled

^ParabombsPower:
	AirstrikePowerCA@Russianparabombs:
		Prerequisites: ~disabled

^ParatroopersPower:
	ParatroopersPowerCA@paratroopers:
		Prerequisites: ~disabled

^TankDropPower:
	ParatroopersPowerCA@TankDrop:
		Prerequisites: ~disabled

# Misc

NERV:
	ExternalCondition@DmgReduction:
		Condition: nerv-damage-reduction
	DamageMultiplier@DmgReduction:
		Modifier: 50
		RequiresCondition: nerv-damage-reduction
	ExternalCondition@NoAutoTarget:
		Condition: no-auto-target
	Targetable@NoAutoTarget:
		TargetTypes: NoAutoTarget
		RequiresCondition: no-auto-target

recall.effect:
	Inherits: CAMERA
	PeriodicExplosion:
		Weapon: FleetRecallEffect

WORMHOLEXL:
	TerrainLightSource:
		Range: 4c0
		Intensity: 0.5
		RedTint: 1

SPLITBLUE:
	Tooltip:
		Name: Blossom Tree

WORMHOLE:
	-TeleportNetwork:
	Health:
		HP: 300000

SIGN:
	Inherits@CAMPAIGNDISABLED: ^Disabled
	CaptureManager:
	Capturable:
		RequiresCondition: !build-incomplete && !being-warped
		Types: building
	CapturableProgressBar:
	CapturableProgressBlink:
	Tooltip:
		GenericVisibility: None
	TooltipExtras:
		-Attributes:

# Removing TeleportNetwork from Wormhole above causes exception as no actors with TeleportNetwork are defined
dummyteleport:
	Inherits: ^InvisibleDummy
	TeleportNetwork:
		Type: Wormhole

# Hunt() requires only 1 AttackBase
DEVA:
	-AttackFrontalCharged:
	-Armament@PRIMARYUPG:
	-AmbientSound@CHARGE:
	-WithIdleOverlay@CHARGE1:
	-WithIdleOverlay@CHARGE2:
	-WithIdleOverlay@CHARGE3:
