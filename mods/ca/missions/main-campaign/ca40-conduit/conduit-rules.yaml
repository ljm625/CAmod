World:
	LuaScript:
		Scripts: campaign.lua, conduit.lua
	MissionData:
		Briefing: 出乎我们意料，\n一只拥有极强心灵能力的Scrin生物——\n也就是曾夺取我们对凯恩半机械人控制权的\n“神童（Prodigy）”——\n竟与尤里一同被囚禁。\n\n囚禁期间，\n尤里得以与该生物交流。\n他认为若能与其主人Scrin尊王结盟，\n将对双方都大有裨益。\n\n若GDI情报可信，\n恐怖分子凯恩已让尊王焦头烂额：\n他煽动内战，\n并威胁尊王延续千年的统治根基。\n若我们在关键时刻伸出援手，\n尊王必将欠下人情，\n而我方也将获得丰厚回报。\n\n必须阻止凯恩这场狂热远征。\n我们必须抓住机会，\n将和平与秩序重新带回\n两个文明。\n有尊王支持，\n我们终将彻底摧毁所有敌人，\n苏维埃霸权时代也将正式降临。\n\n由于通往其母星的多个传送门仍处开启，\nScrin神童已能持续与尊王联络。\n忠诚派遭受重大挫败，\n凯恩似乎正准备率其庞大半机械人大军重返地球，\n而Scrin叛军也在持续蚕食尊王残余兵力。\n\n我们的目标很简单：\n突击Nod基地，\n那里正为凯恩返程准备传送门，\n我们要切断他的退路。\n与此同时，\n我方部队穿越传送门的准备也在进行，\n以便在尊王阵营战局中扭转局势。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: indeep

