World:
	LuaScript:
		Scripts: campaign.lua, illumination.lua
	MissionData:
		Briefing: ———[    Nod引言    ]———\n\n凯恩的半机械人大军\n从Scrin母星传送门中倾泻而出。\n由于凯恩操纵了时间线，\nScrin完全措手不及；\n但他们完成动员不会耗时太久。\n\n传送门出口被偏移，\n迫使Scrin不得不面对额外战线。\n随后凯恩乘坐隐形运输机，\n率一支最精锐半机械人分遣队先行，\n将主力留在后方，\n准备应对必然到来的Scrin反击。\n\n他的目的地由《塔西佗》向其揭示。\n这件承载远古知识的遗物\n在漫长艰难解析后，\n终于显露出真正用途。\n\n———[    任务简报（Nod）   ]———\n\n我们到了。\n我们的伟大目标很快就会明朗，\n但必须争分夺秒。\n\nScrin必然已获知我方到来。\n仅凭我们现身此地，\n就已对他们构成千百年来未有的威胁。\n\n前方洞窟深处，\n埋藏着一项伟大计划的遗迹。\n它曾被如今仍统治Scrin的那群人\n以暴力方式终止并深埋。\n\n一场伟大战争曾在此终结，\n其余烬仍在我们脚下。\n我要让这些余烬再次燃烧。\n\n若我们成功，\nScrin与人类都将迎来新时代黎明。\n\n接管指挥，带领我们穿越洞窟。\n我已带来导航手段，\n也带来了复原那段知识的方法——\n那段Scrin统治者以为已被彻底抹除的知识。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: nodcrush

