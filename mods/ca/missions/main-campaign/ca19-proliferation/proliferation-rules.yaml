^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: ca|missions/main-campaign/ca19-proliferation/charred.pal
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1.1
		Ambient: 0.8

World:
	LuaScript:
		Scripts: campaign.lua, proliferation.lua
	MissionData:
		Briefing: 我们尚未与母星重新建立通讯，\n因此必须最大限度保全\n我们在此地仅存的战力。\n为此，监督者准备调整作战指挥架构。\n你已被认定具备潜力，\n现在需要证明你的统御能力。\n\n已确认一片富含蓝色浆液的区域，\n目前由被称为凯恩者领导的本土势力控制。\n\n利用我们已建立的前哨，\n夺取全部蓝色浆液矿区并开始采集。\n人类采集行动必须被彻底清除。\n\n监督者正在统筹本星球全部兵力调配。\n后续增援将与采集产值成正比，\n而你采集的盈余浆液\n将被转入中央储备库。
	MapOptions:
		ShortGameCheckboxEnabled: True
	MusicPlaylist:
		StartingMusic: dmachine

