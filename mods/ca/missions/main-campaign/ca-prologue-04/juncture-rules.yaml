		Briefing: 关键部件与补给正被运往一处秘密集结点。\n兄弟会中知晓全盘计划的人不多，\n但时机一到，真相自会揭晓。\n\nGDI仍在威胁我们的关键运输线，\n你被选中去确保其中一条埃及线路安全。\n\nGDI舰队正在封锁尼罗河，\n这已严重拖慢我们的进度。\n\n先建立前沿据点，\n随后摧毁沿河岸部署的GDI防空系统。\n清除这些障碍后，\n凯恩将为GDI海军准备一份“惊喜”。
