^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, awakening.lua
	MissionData:
		Briefing: 我们新军的首批战士即将完成。\n我们成功离间了GDI与盟军，\n使其暂时无法干预，\n但苏军如今正向圣殿主基地推进。\n\n一旦新军出动，\n苏军将毫无胜算。\n但准备过程无法再加速。\n不惜一切代价守住圣殿。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: prp

Player:
	PlayerResources:
		DefaultCash: 6000

# Enable subfaction specific tech

BH:
	Buildable:
		Prerequisites: anyradar, ~hand

WTNK:
	Buildable:
		Prerequisites: anyradar, ~vehicles.nod

HFTK:
	Buildable:
		Prerequisites: anyradar, ~vehicles.nod

quantum.upgrade:
	Buildable:
		Prerequisites: tmpl

hstk.upgrade:
	Buildable:
		Prerequisites: tmpl

blacknapalm.upgrade:
	Buildable:
		Prerequisites: tmpl

# Make non-cyborg infantry available with Temple Prime

N1:
	Buildable:
		Prerequisites: ~infantry.td

N3:
	Buildable:
		Prerequisites: ~infantry.td

N4:
	Buildable:
		Prerequisites: ~hand

MECH:
	Buildable:
		Prerequisites: repair, ~infantry.mech

# Disable cyborgs

N1C:
	Inherits@CAMPAIGNDISABLED: ^Disabled

N3C:
	Inherits@CAMPAIGNDISABLED: ^Disabled

N5:
	Inherits@CAMPAIGNDISABLED: ^Disabled

CMEC:
	Inherits@CAMPAIGNDISABLED: ^Disabled

RMBC:
	Inherits@CAMPAIGNDISABLED: ^Disabled
	Health:
		HP: 80000

BIO:
	-OwnerLostAction:
	-SpawnActorOnDeath:
	-ProvidesPrerequisite@mortar:
	-ProvidesPrerequisite@toxintruck:
	Tooltip:
		Name: Weapons Lab
	FireWarheadsOnDeath:
		Type: Footprint
		Weapon: BuildingExplode
		EmptyWeapon: BuildingExplode
	Exit@1:
		SpawnOffset: -190,880,0
		ExitCell: 1,2
		ProductionTypes: Cyborg
	Exit@2:
		SpawnOffset: 190,-400,0
		ExitCell: 1,-1
		ProductionTypes: Cyborg
	Production:
		Produces: Cyborg
	RallyPoint:
	Targetable@V3Ignore:
		TargetTypes: V3Ignore

TTRK:
	-Buildable:

TMPP:
	UnitConverter:
		RequiresCondition: awakening-complete
	ExternalCondition@AWAKENING:
		Condition: awakening-complete
	-Sellable:
	Targetable@V3Ignore:
		TargetTypes: V3Ignore
	DummyConditionConsumer@build-incomplete:
		Condition: build-incomplete
	Power:
		Amount: 0

MIG:
	-MustBeDestroyed:

YAK:
	-MustBeDestroyed:

SUK:
	-MustBeDestroyed:

HIND:
	-MustBeDestroyed:

V3RL:
	AutoTargetPriority@DEFAULT:
		ValidTargets: Structure, Defense
		InvalidTargets: NoAutoTarget, WaterStructure, AntiAirDefense, V3Ignore
