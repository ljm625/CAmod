^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, treachery.lua
	MissionData:
		Briefing: 我们被背叛了！\n近期的失利终于让懦夫叶戈罗夫将军露出真面目。\n他和数量不明的亲信部队\n已投奔盟军。\n\n他显然没料到\n与Nod兄弟会的敌对会这么快结束，\n现在想必已坐立不安。\n\n这种叛徒不配得到怜悯。\n终结他，\n以及所有试图保护他的人。\n\n鲍里斯认为自己就能干掉叛徒。\n若你不认同他的自信，\n更稳妥的做法是先找到我方废弃基地，\n扩充部队后再彻底压垮\n叶戈罗夫的防线。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: terminat

Player:
	PlayerResources:
		DefaultCash: 6000

# Disable powers for AI

^SpyPlanePower:
	AirstrikePowerCA@spyplane:
		Prerequisites: ~!botplayer

^ParabombsPower:
	AirstrikePowerCA@Russianparabombs:
		Prerequisites: ~support.parabombs, ~!botplayer

^ParatroopersPower:
	ParatroopersPowerCA@paratroopers:
		Prerequisites: ~support.paratroopers, ~!botplayer

