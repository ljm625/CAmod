^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, enmity.lua
	MissionData:
		Briefing: ———[    第五章引言    ]———\n\nScrin的影响力正在迅速扩张。\n凯恩已失踪，\n其半机械人大军的大部分如今受Scrin控制，\n连同大量苏军部队也被其裹挟。\n\n兄弟会其余力量已发生分裂。\n一部分人主动投向Scrin，\n将其视为新时代真正先驱；\n另一部分人仍坚信凯恩会归来，\n并继续同时对抗我们与入侵者。\n\n苏军短暂复兴后再次陷入混乱。\n斯大林已退回西伯利亚，\n失去尤里后其进攻能力受限，\n但他依旧拒绝谈判停火，\n其行为也难以按理性预判。\n\n我们确实失去很多阵地，\n但希望仍在。\nScrin本不应如此依赖人类部队替其作战，\n他们之所以如此，\n很可能只是因为无法获得增援。\n其入侵兵力并不充足，\n处境也远比表面更脆弱。\n\n他们正在整合领地并囤积泰伯利亚。\n他们在准备某件事，\n而我们必须查清其目的。\n\n———[    任务简报    ]———\n\nNod部队仍在持续打击我方补给线。\n即便人类存亡在此一线，\n他们也无法放下仇恨。\n在消除这一Nod威胁前，\n我们无法对Scrin展开推进。\n\n通往前线的一条路线已被破坏得尤为严重。\n负责清理该区域的一支分遣队报告称，\n他们已遭遇Nod侦察兵，\n并怀疑新的伏击迫在眉睫。\n立刻接管这支部队，\n确保他们不被击溃。\n\n我们高度怀疑该区域Nod主据点就在附近，\n但目前尚未定位。\n若判断属实，\n我们会投入增援，\n你将被命令清剿当地一切Nod武装。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: trouble

Player:
	PlayerResources:
		DefaultCash: 0

recondronedetection:
	AlwaysVisible:
	Interactable:
	ScriptTriggers:
	ProvidesPrerequisite:

^Cloakable:
	Cloak@SGENCLOAK:
		UncloakOn: Attack, Unload, Infiltrate, Demolish, Damage, Heal, SelfHeal

MSG.Static:
	Inherits: MSG
	Mobile:
		-RequireForceMoveCondition:
	RenderSprites:
		Image: msg
	WithRangeCircle@MSG:
		Range: 9c512
	ProximityExternalCondition@MSG:
		Range: 9c512
	GrantCondition@NOTMOBILE:
		Condition: notmobile
	GrantCondition@DEPLOYED:
		Condition: deployed
	-GrantConditionOnDeploy:
	WithSpriteBody@deployed:
		-RequiresCondition:
	-WithFacingSpriteBody:
	-GrantCondition@PREVIEWWORKAROUND:
	-WithMakeAnimation:
	-Tooltip:
	Tooltip@DEPLOYED:
		-RequiresCondition:

SGEN:
	WithRangeCircle@SGEN:
		Range: 14c512
	ProximityExternalCondition@SGEN:
		Range: 14c512

UAV:
	DetectCloaked:
		RequiresCondition: has-detection
		Range: 7c0
	GrantConditionOnPrerequisite@DETECTION:
		Condition: has-detection
		Prerequisites: recondronedetection
	-Targetable@AIRBORNE:

HQ:
	AirstrikePowerCA@uav:
		Description: \n无人机掠过地图，并沿途揭示区域。

