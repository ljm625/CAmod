
^Palettes:
	TintPostProcessEffect:
		Red: 0.95
		Green: 0.95
		Blue: 1
		Ambient: 0.9
	WeatherOverlay:
		ParticleDensityFactor: 4
		Gravity: 16, 24
		WindTick: 150, 425
		ScatterDirection: -12, 12
		ParticleSize: 2, 3
		ParticleColors: ECECEC44, E4E4E444, D0D0D044, BCBCBC44
		LineTailAlphaValue: 0

World:
	LuaScript:
		Scripts: campaign.lua, statecraft.lua
	MissionData:
		Briefing: 斯大林已死，联盟陷入混乱。\n多名野心勃勃的将军与高官\n正争夺最高权力。\n我们必须迅速行动，\n稳住自身地位并恢复秩序。\n只要协同得当，\n苏维埃帝国仍可从全面崩溃边缘被拉回。\n\n抽调我们仅有的可用兵力建立基地，\n随后迫使最主要的三股势力屈服。\n\n这三派分别由马林尼斯科将军、\n库可夫将军与罗曼诺夫副主席领导。\n三人各自偏好不同作战学说。\n务必审慎判断先打哪一方，\n且不要过快打破力量平衡，\n否则他们可能会联手反扑你。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: twin

Player:
	PlayerResources:
		DefaultCash: 6000
	-GrantExternalConditionPowerCA@HEROESOFUNION:
	-ParatroopersPowerCA@TankDrop:
	-AirstrikePowerCA@KillZone:

INDP:
	Inherits@TankDrop: ^TankDropPower
	ParatroopersPowerCA@TankDrop:
		Prerequisites: ~captured.indp
	CaptureManager:
	Capturable:
		RequiresCondition: !build-incomplete && !being-warped
		Types: building
	CapturableProgressBar:
	CapturableProgressBlink:
	TooltipExtras:
		Attributes: • 最多可建造 1 个

MUNP:
	Inherits@KillZone: ^KillZonePower
	AirstrikePowerCA@KillZone:
		-Prerequisites:
	CaptureManager:
	Capturable:
		RequiresCondition: !build-incomplete && !being-warped
		Types: building
	CapturableProgressBar:
	CapturableProgressBlink:
	TooltipExtras:
		Attributes: • 最多可建造 1 个

CVAT:
	Inherits@HeroesOfTheUnion: ^HeroesOfTheUnionPower
	GrantExternalConditionPowerCA@HEROESOFUNION:
		-Prerequisites:
	CaptureManager:
	Capturable:
		RequiresCondition: !build-incomplete && !being-warped
		Types: building
	CapturableProgressBar:
	CapturableProgressBlink:
	TooltipExtras:
		Attributes: • 最多可建造 1 个

captured.indp:
	Inherits@DUMMY: ^InvisibleDummy
	ProvidesPrerequisite:

MISS:
	Tooltip:
		Name: Outpost
	TooltipDescription:
		Description: 提供周边区域视野。
		ValidRelationships: Ally, Enemy, Neutral
	Health:
		HP: 100000
