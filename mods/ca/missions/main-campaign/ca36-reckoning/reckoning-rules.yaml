^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: alien.pal
	TintPostProcessEffect:
		Red: 1.3
		Green: 1
		Blue: 1.5
		Ambient: 0.5
	FixedColorPalette@BlueTiberium:
		Color: ffffff

^BaseWorld:
	TerrainLighting:
	ResourceRenderer:
		ResourceTypes:
			BlueTiberium:
				Name: Purified Tiberium

^BasePlayer:
	PlayerResources:
		ResourceValues:
			BlueTiberium: 25

World:
	LuaScript:
		Scripts: campaign.lua, reckoning.lua
	MissionData:
		Briefing: 装置运作得近乎完美。\n周边数百里范围内的Scrin\n已不再依赖泰伯利亚生存，\n或其依赖程度已大幅下降。\n随着装置继续使用，\n全部Scrin都可能摆脱这一病症。\n\n这对我们也意味着：\n地球同样可以被净化，\n泰伯利亚那巨大的能量\n可在无副作用前提下被利用。\n\n关于主宰欺瞒真相的消息\n已在Scrin群体中迅速扩散。\n但愿意相信“人类之言”的仍是少数。\n且装置效应传播范围尚不足够广，\n难以立刻说服更大规模Scrin人群。\n\n即便如此，\n仍有大量Scrin已起兵反抗主宰军。\n我们现已身处内战之中。\n\n主宰势力正于全星球范围动员，\n留给我们发动决定性一击的时间极其有限。\n一位反抗军领袖已与我联络，\n并指出了主宰最精锐部队的集结地。\n若能在当地将其击败，\n就可能足以削弱主宰权威，\n使战局向反抗军倾斜。\n至少在装置效应尚未让所有Scrin\n充分看清当前巨变之前，\n这是最可行的突破口。\n\n反抗军已与这支部队交火。\n得益于我方兄弟在多条战线牵制作战，\n我们此刻介入将出其不意。\n我命你率小股兵力先行支援反抗军，\n待我方主力集结完成后，\n在主宰各地援军赶到前，\n摧毁其在该区域的主基地。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: gateway

