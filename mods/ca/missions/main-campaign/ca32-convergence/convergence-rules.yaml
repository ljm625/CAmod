^Palettes:
	PaletteFromFile@terrain-temperat:
		Filename: alien.pal
	FlashPostProcessEffect@LIGHTNINGSTRIKE:
		Type: LightningStrike
	FlashPostProcessEffect@IONSTRIKE:
		Type: IonStrike
		Color: D48FFF
	TintPostProcessEffect:
		Red: 1
		Green: 1
		Blue: 1.2
		Ambient: 0.4

^BaseWorld:
	TerrainLighting:

World:
	LuaScript:
		Scripts: campaign.lua, convergence.lua
	MissionData:
		Briefing: 我们已在传送门另一侧集结可观兵力，\n并持续加固防线。\nScrin一度似乎对我方存在毫无兴趣，\n但传感网络现已探测到\n一支大型Scrin舰队正伴随地面部队\n高速向我方逼近。\n\n形势对我们极为不利，\n但别无选择，只能迎战。\n若失去立足点，\nScrin全面入侵地球只是时间问题；\n与此同时，\n我们也将失去阻止凯恩计划的能力\n（前提是Scrin尚未先行阻止他）。\n\n推进中的Scrin部队\n似乎刻意无视了我方一处远端前哨，\n其行动路线近乎直指我主基地。\n\n我方北部主防线仍在构筑中。\n你的任务是尽可能强化现有防御，\n并阻止Scrin舰队突破防线。
	MapOptions:
		ShortGameCheckboxEnabled: False
	MusicPlaylist:
		StartingMusic: heroism

Player:
	PlayerResources:
		DefaultCash: 6000

# Enable subfaction specific tech

XO:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

WOLV:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

PBUL:
	Buildable:
		Prerequisites: gtek, ~vehicles.gdi

STWR:
	Buildable:
		Prerequisites: vehicles.any, ~structures.gdi

ionmam.upgrade:
	Buildable:
		Prerequisites: upgc, !mdrone.upgrade, !hovermam.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

hovermam.upgrade:
	Buildable:
		Prerequisites: upgc, !ionmam.upgrade, !mdrone.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

mdrone.upgrade:
	Buildable:
		Prerequisites: upgc, !ionmam.upgrade, !hovermam.upgrade
	TooltipExtras:
		Attributes: \n(!) Only ONE Mammoth Tank upgrade can be chosen

