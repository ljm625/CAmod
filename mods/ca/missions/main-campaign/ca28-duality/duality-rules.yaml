^Palettes:
	TintPostProcessEffect:

World:
	LuaScript:
		Scripts: campaign.lua, duality.lua
	MissionData:
		Briefing: 时间紧迫，刻不容缓！\n盟军雇佣兵谭雅已被派去渗透一处\n被Scrin用于囤积泰伯利亚的设施。\n\n她原计划使用爆破物摧毁库存，\n但该设施守备强度超出预期。\n她已负伤，\n目前正躲避Scrin追捕，\n无法自行抵达撤离出口。\n\n派出我方一名突击队员寻找谭雅。\n二人会合后，\n应能完成原定任务。\n\n在通信中断前，\n其位置被确认在设施东侧区域。
	MapOptions:
		ShortGameCheckboxEnabled: False
	ScriptLobbyDropdown@RESPAWN:
		ID: respawn
		Label: Respawns
		Description: Enable/disable respawning on death
		Values:
			enabled: Enabled
			disabled: Disabled
		Default: disabled
		DisplayOrder: 999
	MusicPlaylist:
		StartingMusic: search

Player:
	PlayerResources:
		DefaultCash: 0

SILO.SCRIN:
	-SpawnActorOnDeath:

SILO.SCRINBLUE:
	Inherits: SILO.SCRIN

^DifficultyModifiers:
	Inherits@ActorDifficultyConditions: ^ActorDifficultyConditions
	DamageMultiplier@EASY:
		Modifier: 75
		RequiresCondition: difficulty-easy
	DamageMultiplier@NORMAL:
		Modifier: 100
		RequiresCondition: difficulty-normal
	DamageMultiplier@HARD:
		Modifier: 125
		RequiresCondition: difficulty-hard
	RevealsShroudMultiplier@EASY:
		Modifier: 115
		RequiresCondition: difficulty-easy
	RangeMultiplier@EASY:
		Modifier: 115
		RequiresCondition: difficulty-easy
	GrantConditionOnDamageState@WOUNDED:
		ValidDamageStates: Critical
		Condition: wounded
	SpeedMultiplier@WOUNDED:
		RequiresCondition: wounded
		Modifier: 75

RMBO:
	Inherits@DIFFICULTY: ^DifficultyModifiers
	RevealsShroud:
		Range: 8c0

E7:
	Inherits@DIFFICULTY: ^DifficultyModifiers
	RevealsShroud:
		Range: 8c0
	Health:
		HP: 25000
	MustBeDestroyed:
		RequiredForShortGame: true
	Mobile:
		Speed: 92
	TakeCover:
		SpeedModifier: 85
	ExternalCondition@slowed:
		Condition: slowed
	SpeedMultiplier@slowed1:
		Modifier: 70
		RequiresCondition: slowed == 1
	SpeedMultiplier@slowed2:
		Modifier: 40
		RequiresCondition: slowed > 1
	WithDecoration@COMMANDOSKULL:
		RequiresCondition: chilled
	AutoTarget:
		InitialStance: HoldFire

PDGY:
	AutoTargetPriority@DEFAULT:
		RequiresCondition: stance-attackanything || assault-move
	Mobile:
		Speed: 36
	RevealsShroud:
		Range: 12c0
	WithRangeCircle@ZAPRANGENORMAL:
		Type: Psi
		Visible: Always
		ValidRelationships: Ally, Enemy
		Color: 9b25ffaa
		Range: 12c0
		RequiresCondition: activated
	ExternalCondition@ACTIVATED:
		Condition: activated
	Armament@PRIMARY:
		Weapon: ProdigyZap
	-MindController:
	-MindControllerCapacityModifier@RANK-1:
	-MindControllerCapacityModifier@RANK-2:
	-MindControllerCapacityModifier@RANK-ELITE:
	-WithIdleOverlay@mindcontrolling:

WORMHOLE:
	-Targetable:
