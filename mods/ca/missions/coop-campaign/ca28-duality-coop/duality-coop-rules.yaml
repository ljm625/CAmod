World:
	LuaScript:
		Scripts: campaign.lua, coop.lua, ca|missions/main-campaign/ca28-duality/duality.lua, duality-coop.lua
	ScriptLobbyDropdown@CAMLOCK:
		ID: camlock
		Label: Camera Lock
		Description: 启用/禁用镜头锁定在最后一个单位上。
		Values:
			enabled: Enabled
			disabled: Disabled
		Default: disabled
		DisplayOrder: 999
	ScriptLobbyDropdown@MISSIONTIMER:
		ID: missiontimer
		Label: Mission Timer
		Description: 启用/禁用时间限制\n或启用Rush模式：初始1分钟，每摧毁一个筒仓增加时间。
		Values:
			enabled: Enabled
			disabled: Disabled
			rush: Rush Mode
		Default: disabled
		DisplayOrder: 999
	LobbyMissionInfo@InitialObjectives:
		Prefix: Initial Objectives
		Text: • 摧毁全部Scrin筒仓。\n• 撤离该设施。
	LobbyMissionInfo@Notes:
		Prefix: Note
		Text: 本任务可启用重生。
		PrefixColor: FF9900
		TextColor: FF9900
